version: "3.7"

services:
  tooljet-ai:
    image: ghcr.io/athulya-cloud/tooljet-ai-server:latest
    container_name: tooljet-ai
    ports:
      - "${AI_PORT:-8080}:8000"
    networks:
      - tooljet-network

  neo4j:
    image: neo4j:5
    container_name: tooljet-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-tooljet_secret}
    volumes:
      - neo4j_data:/data
    networks:
      - tooljet-network

volumes:
  neo4j_data:

networks:
  tooljet-network:
    driver: bridge


ports:
  - "8000:8000"
  - "8001:8001"
  - "8002:8002"
